name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Run offline test suite
        run: uv run pytest -m "not live" --html=reports/pytest.html --self-contained-html

      - name: Upload pytest HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: reports/pytest.html

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: ignore

  live-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run live suite
        env:
          STATS_NZ_API_KEY: ${{ secrets.STATS_NZ_API_KEY }}
        run: uv run pytest -m live --html=reports/pytest-live.html --self-contained-html

      - name: Upload live pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-live-report
          path: reports/pytest-live.html
